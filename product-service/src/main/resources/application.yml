server:
  port: 8084


spring:
  application:
    name: product-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka}

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true


management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
