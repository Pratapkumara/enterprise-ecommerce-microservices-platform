namespace: default

images:

  apiGateway:
    repository: api-gateway
    tag: "build-6"

  product:
    repository: product-service
    tag: "build-6"

  user:
    repository: user-service
    tag: "build-6"

  inventory:
    repository: inventory-service
    tag: "build-6"

  order:
    repository: order-service
    tag: "build-6"

  payment:
    repository: payment-service
    tag: "build-6"

  notification:
    repository: notification-service
    tag: "build-6"

  discovery:
    repository: discovery-server
    tag: "build-6"

  config:
    repository: config-server
    tag: "build-6"


services:

  apiGateway:
    port: 8082

  product:
    port: 8084

  user:
    port: 8083

  inventory:
    port: 8086

  order:
    port: 8087

  payment:
    port: 8088

  notification:
    port: 8089

  discovery:
    port: 8761

  config:
    port: 8888


# PostgreSQL Database
postgresql:

  enabled: true

  auth:
    postgresPassword: postgres
    username: postgres
    password: postgres
    database: ecommerce

  primary:
    persistence:
      enabled: true
      size: 5Gi

  service:
    nameOverride: postgres
