# Source: ecommerce/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ecommerce-ingress

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:

  ingressClassName: nginx

  rules:

  - host: ecommerce.local

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: api-gateway

            port:

              number: 8082
