apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
        - name: product-service

          image: "{{ .Values.images.product.repository }}:{{ .Values.images.product.tag }}"
          imagePullPolicy: Never

          ports:
            - containerPort: {{ .Values.services.product.port }}

          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server:8888

            - name: EUREKA_URL
              value: http://discovery-server:8761/eureka
