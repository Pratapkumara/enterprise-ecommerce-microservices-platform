apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:

    metadata:
      labels:
        app: order-service

    spec:

      containers:

      - name: order-service

        image: "{{ .Values.images.order.repository }}:{{ .Values.images.order.tag }}"

        imagePullPolicy: Never

        ports:

        - containerPort: {{ .Values.services.order.port }}

        env:

        - name: CONFIG_SERVER_URL
          value: http://config-server:8888

        - name: EUREKA_URL
          value: http://discovery-server:8761/eureka
