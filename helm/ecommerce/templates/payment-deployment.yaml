apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-service

  template:

    metadata:
      labels:
        app: payment-service

    spec:

      containers:

      - name: payment-service

        image: "{{ .Values.images.payment.repository }}:{{ .Values.images.payment.tag }}"

        imagePullPolicy: Never

        ports:

        - containerPort: {{ .Values.services.payment.port }}

        env:

        - name: CONFIG_SERVER_URL
          value: http://config-server:8888

        - name: EUREKA_URL
          value: http://discovery-server:8761/eureka
