apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service

    spec:
      containers:
        - name: inventory-service

          image: "{{ .Values.images.inventory.repository }}:{{ .Values.images.inventory.tag }}"

          imagePullPolicy: Never

          ports:
            - containerPort: {{ .Values.services.inventory.port }}
