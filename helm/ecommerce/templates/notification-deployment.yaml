apiVersion: apps/v1
kind: Deployment

metadata:
  name: notification-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notification-service

  template:
    metadata:
      labels:
        app: notification-service

    spec:
      containers:
      - name: notification-service
        image: "{{ .Values.images.notification.repository }}:{{ .Values.images.notification.tag }}"
        imagePullPolicy: Never

        ports:
        - containerPort: {{ .Values.services.notification.port }}

        env:
        - name: SPRING_CONFIG_IMPORT
          value: optional:configserver:http://config-server:8888

        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://discovery-server:8761/eureka/
