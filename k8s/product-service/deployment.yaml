apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service
  labels:
    app: product-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
        - name: product-service
          image: product-service:1.0
          imagePullPolicy: Never

          ports:
            - containerPort: 8084

          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
