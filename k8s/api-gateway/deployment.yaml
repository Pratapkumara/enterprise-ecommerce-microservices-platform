apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  labels:
    app: api-gateway

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway
          image: api-gateway:1.0
          imagePullPolicy: Never

          ports:
            - containerPort: 8082

          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
