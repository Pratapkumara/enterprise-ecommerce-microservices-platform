apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-service
  labels:
    app: inventory-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service

    spec:
      containers:
        - name: inventory-service
          image: inventory-service:1.0
          imagePullPolicy: Never

          ports:
            - containerPort: 8086

          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
