apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service
  labels:
    app: order-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
        - name: order-service
          image: order-service:1.0
          imagePullPolicy: Never

          ports:
            - containerPort: 8087

          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
