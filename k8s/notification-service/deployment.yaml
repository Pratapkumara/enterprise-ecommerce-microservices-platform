apiVersion: apps/v1
kind: Deployment

metadata:
  name: notification-service
  labels:
    app: notification-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notification-service

  template:
    metadata:
      labels:
        app: notification-service

    spec:
      containers:
        - name: notification-service
          image: notification-service:1.0
          imagePullPolicy: Never

          ports:
            - containerPort: 8089

          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
