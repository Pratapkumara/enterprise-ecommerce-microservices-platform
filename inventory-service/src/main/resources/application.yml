spring:
  application:
    name: inventory-service

  config:
    import: optional:configserver:http://config-server:8888


eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka

    register-with-eureka: true
    fetch-registry: true


management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
