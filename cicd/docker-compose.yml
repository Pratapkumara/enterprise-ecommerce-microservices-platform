services:
  jenkins:
    build:
      context: ..
      dockerfile: cicd/Dockerfile.jenkins
    image: enterprise-jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped

    user: "1000:1000"

    group_add:
      - "109"

    ports:
      - "8080:8080"
      - "50000:50000"

    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=true
        -Xms512m
        -Xmx2048m
      KUBECONFIG: /home/ubuntu/.kube/config
      MINIKUBE_HOME: /home/ubuntu

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/.kube:/home/ubuntu/.kube:ro
      - /home/ubuntu/.minikube:/home/ubuntu/.minikube:ro

    networks:
      - cicd-network
      - minikube-network

    depends_on:
      sonarqube:
        condition: service_healthy

  sonarqube-db:
    image: postgres:17
    container_name: sonarqube-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube

    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data

    networks:
      - cicd-network

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sonarqube -d sonarqube
      interval: 10s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: unless-stopped

    depends_on:
      sonarqube-db:
        condition: service_healthy

    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_WEB_JAVAOPTS: -Xms512m -Xmx1024m
      SONAR_CE_JAVAOPTS: -Xms512m -Xmx1024m

    ports:
      - "9000:9000"

    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

    networks:
      - cicd-network

    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:9000/api/system/status | grep -q '"status":"UP"'
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 90s

volumes:
  jenkins_home:
  sonarqube_postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  cicd-network:
    name: cicd-network

  minikube-network:
    external: true
    name: minikube
