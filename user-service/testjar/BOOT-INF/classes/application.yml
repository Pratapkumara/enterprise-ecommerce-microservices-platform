server:
  port: 8083

spring:
  application:
    name: user-service

  config:
    import: optional:configserver:http://config-server:8888

jwt:
  secret: mySuperSecretKeyForJwtTokenGeneration123456789

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
