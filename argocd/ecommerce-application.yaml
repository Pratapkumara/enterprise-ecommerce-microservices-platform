apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-platform
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Pratapkumara/enterprise-ecommerce-microservices-platform.git
    targetRevision: main
    path: helm/ecommerce

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
